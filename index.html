<!DOCTYPE html>
<html lang="en-US">

  <head>
    <meta charset="UTF-8">
    <title>Build Notes</title>
  </head>

  <body style="background-color:powderblue;">
    <h1>Build Notes</h1>

    <!-- Search Bar -->
    <section id="searchSection">
      <h2>Search Notes</h2>
      <form id="searchForm">
        <label for="search">Search (Separate by comma)</label><br>
        <input type="search" id="searchInput" name="search" placeholder="query1,query2,query3" required>
        <button type="submit">Search</button>
      </form>
    </section><br>

    <!-- Title and Note Content -->
    <section id="createNoteSection">
      <h2 id="modeTitle">New Note</h2>
      <form id="noteForm">
          <label for="title">Title:</label><br>
          <input type="text" id="titleInput" name="title" required><br>
          <label for="content">Note Content:</label><br>
          <textarea name="content" id="contentInput" rows="10" cols="40" required></textarea><br>
          <label for="tags">Tags (Separate by comma)</label><br>
          <input type="text" id="tagInput" name="tags" placeholder="tag1,tag2,tag3"><br><br>
          <div id="createNoteButtons">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
          </div>
          <div id="editNoteButtons" hidden>
            <button type="submit">Save Changes</button>
            <button type="button" id="cancelButton">Cancel</button>
          </div>
      </form>
    </section><br>

    <!-- View Note -->
    <section id="viewNoteSection" hidden>
      <h2>View Note</h2>
      <p>
        <strong>Title: </strong>
        <span id="noteTitleView"></span>
      </p>
      <p>
        <strong>Date Created: </strong>
        <span id="dateCreatedView"></span>
      </p>
      <strong>Note Content:</strong>
      <p id="noteContentView" style="max-width: 40ch; overflow-wrap: break-word;"></p>
      <p>
        <strong>Tags: </strong>
        <span id="tagsView"></span>
      </p>
      <div>
        <button type="button" id="editNoteButton">Edit Note</button>
        <button type="button" id="removeNoteButton">Delete Note</button>
        <button type="button" id="createNewNoteButton">Create New Note</button>
      </div>
    </section><br>

    <!-- Previous Notes Section -->
    <section id="previousNotesSection">
      <aside>
        <h2>Previous Notes</h2>
        <ol id="previousNoteList">
        </ol>
      </aside>
    </section>

    <section>
      <h2>Clear Local Storage</h2>
      <button type="button" id="clearAllDataButton">Clear All Notes</button>
    </section>
    
    <script src="note.js"></script>
  </body>
</html>
