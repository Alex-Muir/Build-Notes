<!DOCTYPE html>
<html lang="en-US">

  <head>
    <meta charset="UTF-8">
    <title>Build Notes</title>
  </head>

  <body style="background-color:powderblue;">
    <h1>Build Notes</h1>

    <!-- Search Bar -->
    <section>
      <h2>Search Notes</h2>
      <form>
        <label for="search">Search:</label><br>
        <input type="search" id="search" name="search">
        <button type="submit">Search</button>
      </form>
    </section><br><br>

    <!-- Title and Note Content -->
    <section>
      <h2>New Note</h2>
      <form >
          <label for="title">Title:</label><br>
          <input type="text" id="title" name="title" required><br>
          <label for="content">Note Content:</label><br>
          <textarea name="content" id="content" rows="10" cols="40" required></textarea><br>
          <label for="tags">Tags (Seperate by comma)</label><br>
          <input type="text" id="tags" name="tags" placeholder="tag1,tag2,tag3"><br><br>
          <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
          </div>
      </form>
    </section>

  </body>
</html>
