<!DOCTYPE html>
<html lang="en-US">

  <head>
    <meta charset="UTF-8">
    <title>Build Notes</title>
  </head>

  <body style="background-color:powderblue;">
    <h1>Build Notes</h1>

    <!-- Search Bar -->
    <section>
      <h2>Search Notes</h2>
      <form id="searchForm">
        <label for="search">Search (Separate by comma)</label><br>
        <input type="search" id="searchInput" name="search" placeholder="query1,query2,query3">
        <button type="submit">Search</button>
      </form>
    </section><br><br>

    <!-- Title and Note Content -->
    <section>
      <h2>New Note</h2>
      <form id="noteForm">
          <label for="title">Title:</label><br>
          <input type="text" id="titleInput" name="title" required><br>
          <label for="content">Note Content:</label><br>
          <textarea name="content" id="contentInput" rows="10" cols="40" required></textarea><br>
          <label for="tags">Tags (Separate by comma)</label><br>
          <input type="text" id="tagInput" name="tags" placeholder="tag1,tag2,tag3"><br><br>
          <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
          </div>
      </form>
    </section>
    
    <script src="note.js"></script>
  </body>
</html>
